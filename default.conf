server {
    listen 80;
    server_name localhost;

    # Serve marketing pages at the root level, fallback to parent directory
    location / {
        root /usr/share/nginx/html/marketing;
        index index.html;
        try_files $uri $uri/ @parent_root;
    }

    # Fallback to search in the parent html directory
    location @parent_root {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    # Redirect /marketing/ requests to root to keep URLs clean
    location /marketing/ {
        rewrite ^/marketing/(.*)$ /$1 permanent;
    }

    # Serve legal pages from the root /legal/ directory
    location /legal/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    # Serve assets from the root /assets/ directory
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    # Serve JS scripts from the root /js/ directory
    location /js/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    # Serve components from the root /components/ directory
    location /components/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    # Serve widgets from the root /widgets/ directory
    location /widgets/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ =404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
