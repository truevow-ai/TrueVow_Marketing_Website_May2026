m-t {            position: absolute;            left: 0;            top: 0;            font-size: 32px;            font-weight: 300;            color: #808080;            opacity: 0.5;            line-height: 1;        }                .logo-monogram-v {            position: absolute;            left: 8px;            top: 0;            font-size: 32px;            font-weight: 700;            color: #0A2463;            line-height: 1;        }                .logo-text {            display: flex;            align-items: baseline;            gap: 0;        }                .logo-true {            font-size: 22px;            font-weight: 400;            color: #808080;            letter-spacing: 0.5px;        }                .logo-vow {            font-size: 22px;            font-weight: 700;            color: #0A2463;            letter-spacing: 0.5px;        }                .logo-law {            font-size: 16px;            font-weight: 700;            color: #0A2463;            margin-left: 1px;        }                .nav-links {            display: flex;            gap: 32px;            align-items: center;        }                .nav-links a {            text-decoration: none;            color: #555555;            font-weight: 500;            transition: color 0.3s;        }                .nav-links a:hover {            color: #0A2463;        }                .nav-cta {            background: #0A2463;            color: white !important;            padding: 12px 24px;            border-radius: 8px;            font-weight: 600;            transition: background 0.3s;        }                .nav-cta:hover {            background: #0052CC;        }                /* HERO */        .hero {            background: linear-gradient(135deg, #0A2463 0%, #1a3a8a 100%);            color: white;            padding: 80px 24px 60px;            text-align: center;        }                .hero h1 {            font-size: 48px;            font-weight: 800;            margin-bottom: 16px;            line-height: 1.2;        }                .hero-subtitle {            font-size: 22px;            opacity: 0.95;            max-width: 800px;            margin: 0 auto;        }                /* LIVE STATS BANNER */        .live-stats {            background: rgba(255,255,255,0.15);            padding: 24px;            border-radius: 12px;            margin-top: 32px;            max-width: 900px;            margin-left: auto;            margin-right: auto;            display: grid;            grid-template-columns: repeat(3, 1fr);            gap: 24px;        }                .stat-item {            text-align: center;        }                .stat-number {            font-size: 36px;            font-weight: 800;            display: block;            margin-bottom: 4px;        }                .stat-label {            font-size: 14px;            opacity: 0.9;        }                /* CONTENT SECTIONS */        .container {            max-width: 1000px;            margin: 0 auto;            padding: 0 24px;        }                .section {            padding: 60px 24px;        }                .section-title {            font-size: 36px;            font-weight: 800;            color: #0A2463;            margin-bottom: 24px;            display: flex;            align-items: center;            gap: 12px;        }                .section-icon {            font-size: 40px;        }                .section-content {            font-size: 18px;            line-height: 1.8;            color: #333;        }                .highlight-box {            background: #E8F4FD;            border-left: 4px solid #0A2463;            padding: 24px;            margin: 24px 0;            border-radius: 8px;        }                .highlight-box strong {            color: #0A2463;        }                /* CHART CONTAINER */        .chart-container {            max-width: 700px;            margin: 40px auto;            padding: 24px;            background: white;            border-radius: 12px;            box-shadow: 0 2px 12px rgba(0,0,0,0.08);        }                /* PROGRESS BAR */        .progress-bar-container {            margin: 12px 0;        }                .progress-bar-label {            display: flex;            justify-content: space-between;            margin-bottom: 6px;            font-size: 14px;            font-weight: 600;        }                .progress-bar {            width: 100%;            height: 24px;            background: #E5E5E5;            border-radius: 12px;            overflow: hidden;            position: relative;        }                .progress-fill {            height: 100%;            background: linear-gradient(90deg, #0A2463, #0052CC);            border-radius: 12px;            transition: width 1s ease-out;            display: flex;            align-items: center;            justify-content: flex-end;            padding-right: 12px;            color: white;            font-size: 12px;            font-weight: 700;        }                .progress-fill.filling {            background: linear-gradient(90deg, #F57C00, #FF9800);        }                .progress-fill.sold-out {            background: linear-gradient(90deg, #C62828, #D32F2F);        }                /* TABLE */        .capacity-table {            width: 100%;            border-collapse: collapse;            margin: 32px 0;            background: white;            box-shadow: 0 2px 12px rgba(0,0,0,0.08);            border-radius: 12px;            overflow: hidden;        }                .capacity-table thead {            background: #0A2463;            color: white;        }                .capacity-table th {            padding: 16px;            text-align: left;            font-weight: 700;            font-size: 14px;            text-transform: uppercase;            letter-spacing: 0.5px;        }                .capacity-table td {            padding: 16px;            border-bottom: 1px solid #E5E5E5;
