<!-- PRE-FILL INDICATOR COMPONENT -->
<!-- Shows "✅ 4/8 fields pre-filled" when coming from demo -->
<!-- Add this at the top of application form (after hero) -->

<style>
    .prefill-indicator {
        display: none;
        max-width: 800px;
        margin: -20px auto 32px;
        padding: 20px 24px;
        background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%);
        border: 2px solid #10B981;
        border-radius: 12px;
        animation: slideDown 0.5s;
    }
    
    .prefill-indicator.show {
        display: flex;
        align-items: center;
        gap: 16px;
    }
    
    @keyframes slideDown {
        from {
            transform: translateY(-20px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }
    
    .prefill-indicator-icon {
        font-size: 32px;
        flex-shrink: 0;
    }
    
    .prefill-indicator-content {
        flex: 1;
    }
    
    .prefill-indicator-title {
        font-size: 18px;
        font-weight: 700;
        color: #065F46;
        margin-bottom: 4px;
    }
    
    .prefill-indicator-description {
        font-size: 14px;
        color: #047857;
        line-height: 1.5;
    }
    
    .prefill-indicator-stats {
        display: flex;
        gap: 16px;
        margin-top: 8px;
    }
    
    .prefill-stat {
        font-size: 13px;
        color: #059669;
        font-weight: 600;
    }
    
    .prefill-progress {
        width: 100%;
        height: 6px;
        background: rgba(16, 185, 129, 0.2);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 12px;
    }
    
    .prefill-progress-bar {
        height: 100%;
        background: #10B981;
        transition: width 1s ease;
        border-radius: 3px;
    }
    
    @media (max-width: 768px) {
        .prefill-indicator {
            flex-direction: column;
            text-align: center;
        }
        
        .prefill-indicator-stats {
            justify-content: center;
        }
    }
</style>

<div class="prefill-indicator" id="prefillIndicator">
    <div class="prefill-indicator-icon">✅</div>
    <div class="prefill-indicator-content">
        <div class="prefill-indicator-title">
            Welcome back! We've saved your information
        </div>
        <div class="prefill-indicator-description">
            <span id="prefilledCount">4</span>/8 fields pre-filled from your demo. 
            Complete the remaining fields in just <strong>90 seconds</strong>.
        </div>
        <div class="prefill-indicator-stats">
            <span class="prefill-stat">⏱️ Est. time: 90 seconds</span>
            <span class="prefill-stat">🎁 21 FREE bookings waiting</span>
        </div>
        <div class="prefill-progress">
            <div class="prefill-progress-bar" id="prefillProgressBar" style="width: 50%;"></div>
        </div>
    </div>
</div>

<script>
    // Enhanced auto-population with visual feedback
    async function loadDemoSessionEnhanced() {
        const urlParams = new URLSearchParams(window.location.search);
        const demoSessionId = urlParams.get('demo');
        
        if (demoSessionId) {
            try {
                const response = await fetch(`/api/v1/demo-session/${demoSessionId}`);
                if (response.ok) {
                    const demoData = await response.json();
                    
                    let prefilledCount = 0;
                    const totalFields = 8;
                    
                    // Pre-fill form fields
                    if (demoData.email) {
                        document.getElementById('email').value = demoData.email;
                        prefilledCount++;
                    }
                    if (demoData.firm_name) {
                        document.getElementById('firmName').value = demoData.firm_name;
                        prefilledCount++;
                    }
                    if (demoData.phone) {
                        document.getElementById('phone').value = demoData.phone;
                        prefilledCount++;
                    }
                    if (demoData.practice_area) {
                        document.getElementById('practiceArea').value = demoData.practice_area;
                        prefilledCount++;
                    }
                    
                    // Show prefill indicator
                    const indicator = document.getElementById('prefillIndicator');
                    indicator.classList.add('show');
                    
                    // Update count
                    document.getElementById('prefilledCount').textContent = prefilledCount;
                    
                    // Update progress bar
                    const percentage = (prefilledCount / totalFields) * 100;
                    document.getElementById('prefillProgressBar').style.width = percentage + '%';
                    
                    // Update hero message
                    const heroMessage = document.querySelector('.application-hero p');
                    if (heroMessage && demoData.first_name) {
                        heroMessage.innerHTML = `Welcome back, ${demoData.first_name}! 🎉<br>Thanks for trying Benjamin. Complete your application to lock in the $19/booking Founding Member rate (with 3 free bookings every month while you stay active).`;
                    }
                    
                    // Track analytics
                    if (typeof gtag !== 'undefined') {
                        gtag('event', 'prefill_detected', {
                            'event_category': 'conversion',
                            'event_label': 'Demo Session Auto-Fill',
                            'prefilled_fields': prefilledCount
                        });
                    }
                }
            } catch (error) {
                console.error('Error loading demo session:', error);
            }
        }
    }
    
    // Load on page load
    window.addEventListener('DOMContentLoaded', () => {
        loadDemoSessionEnhanced();
    });
</script>
