name: Rebuild Blog on Content Update

on:
  # Trigger on push to main branch (when admin adds content)
  push:
    branches:
      - main
    paths:
      - 'pages/blog.tsx'
      - 'pages/api/blog/**'
      - 'lib/supabaseClient.ts'
  
  # Trigger manually via workflow_dispatch
  workflow_dispatch:
  
  # Trigger on schedule (every 10 minutes - check for new published content)
  schedule:
    - cron: '*/10 * * * *'
  
  # Trigger via webhook from Supabase (recommended)
  repository_dispatch:
    types: [content-published]

jobs:
  rebuild:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Fetch latest content from Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          echo "Fetching latest blog content..."
          # This will be used during build time
      
      - name: Build static site
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build
      
      - name: Deploy to production
        # This step depends on your hosting provider
        # Examples below for common platforms
        run: |
          echo "Deploying to production..."
          # Vercel: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
          # Netlify: netlify deploy --prod --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}
          # AWS S3: aws s3 sync ./out s3://your-bucket-name
      
      - name: Notify on success
        if: success()
        run: |
          echo "✅ Blog rebuilt and deployed successfully!"
          # Optional: Send notification to Slack/Discord
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          #   -H 'Content-Type: application/json' \
          #   -d '{"text":"Blog rebuilt successfully with latest content"}'
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Blog rebuild failed!"
          # Optional: Send error notification

