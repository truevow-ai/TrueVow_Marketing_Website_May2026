<!-- REAL-TIME SOCIAL PROOF NOTIFICATIONS -->
<!-- "John in Tampa just applied 3 min ago" -->
<!-- Add this before </body> tag -->

<style>
    .social-proof-notification {
        position: fixed;
        bottom: 100px;
        left: 24px;
        background: white;
        padding: 16px 20px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        display: none;
        align-items: center;
        gap: 16px;
        max-width: 400px;
        z-index: 9997;
        animation: slideInLeft 0.5s, slideOutLeft 0.5s 6.5s;
    }
    
    @keyframes slideInLeft {
        from {
            transform: translateX(-120%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }
    
    @keyframes slideOutLeft {
        from {
            transform: translateX(0);
            opacity: 1;
        }
        to {
            transform: translateX(-120%);
            opacity: 0;
        }
    }
    
    .social-proof-notification.show {
        display: flex;
    }
    
    .social-proof-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: linear-gradient(135deg, #0066FF 0%, #0052CC 100%);
        color: white;
        display: flex;
        align-items: center;
        justify-center;
        font-weight: 700;
        font-size: 18px;
        flex-shrink: 0;
    }
    
    .social-proof-content {
        flex: 1;
    }
    
    .social-proof-name {
        font-weight: 700;
        color: #1A1A1A;
        margin-bottom: 4px;
        font-size: 15px;
    }
    
    .social-proof-action {
        color: #666;
        font-size: 14px;
        line-height: 1.4;
    }
    
    .social-proof-time {
        color: #999;
        font-size: 12px;
        margin-top: 4px;
    }
    
    .social-proof-icon {
        font-size: 24px;
        flex-shrink: 0;
    }
    
    .social-proof-close {
        position: absolute;
        top: 8px;
        right: 8px;
        background: none;
        border: none;
        color: #999;
        font-size: 18px;
        cursor: pointer;
        padding: 4px;
        line-height: 1;
    }
    
    @media (max-width: 768px) {
        .social-proof-notification {
            left: 16px;
            right: 16px;
            max-width: calc(100% - 32px);
            bottom: 90px;
        }
    }
</style>

<div class="social-proof-notification" id="socialProofNotification">
    <div class="social-proof-avatar" id="socialProofAvatar">JM</div>
    <div class="social-proof-content">
        <div class="social-proof-name" id="socialProofName">John M.</div>
        <div class="social-proof-action" id="socialProofAction">
            from <strong>Tampa</strong> just secured their Founding Member spot
        </div>
        <div class="social-proof-time" id="socialProofTime">3 minutes ago</div>
    </div>
    <div class="social-proof-icon">🎉</div>
    <button class="social-proof-close" onclick="closeSocialProof()">×</button>
</div>

<script>
    // Sample social proof data (in production, fetch from API)
    const socialProofData = [
        { name: 'John M.', city: 'Tampa', initials: 'JM', action: 'secured their Founding Member spot', time: '3 minutes ago' },
        { name: 'Maria L.', city: 'Orlando', initials: 'ML', action: 'completed their application', time: '7 minutes ago' },
        { name: 'David K.', city: 'Miami', initials: 'DK', action: 'locked in the $19/booking Founding Member rate', time: '12 minutes ago' },
        { name: 'Sarah P.', city: 'Jacksonville', initials: 'SP', action: 'claimed their spot in Jacksonville County', time: '18 minutes ago' },
        { name: 'Robert H.', city: 'Fort Lauderdale', initials: 'RH', action: 'joined the waitlist for Broward County', time: '25 minutes ago' },
        { name: 'Jennifer W.', city: 'West Palm Beach', initials: 'JW', action: 'started their demo call', time: '32 minutes ago' },
        { name: 'Michael C.', city: 'St. Petersburg', initials: 'MC', action: 'secured 21 FREE bookings', time: '38 minutes ago' },
        { name: 'Lisa R.', city: 'Tallahassee', initials: 'LR', action: 'applied for Founding Membership', time: '45 minutes ago' },
        { name: 'James T.', city: 'Port St. Lucie', initials: 'JT', action: 'referred 2 colleagues and earned $500', time: '52 minutes ago' },
        { name: 'Amanda B.', city: 'Cape Coral', initials: 'AB', action: 'checked county cap availability', time: '1 hour ago' }
    ];
    
    let currentProofIndex = 0;
    let socialProofInterval;
    let socialProofShown = false;
    
    function showSocialProof() {
        const notification = document.getElementById('socialProofNotification');
        const data = socialProofData[currentProofIndex];
        
        // Update notification content
        document.getElementById('socialProofAvatar').textContent = data.initials;
        document.getElementById('socialProofName').textContent = data.name;
        document.getElementById('socialProofAction').innerHTML = 
            `from <strong>${data.city}</strong> just ${data.action}`;
        document.getElementById('socialProofTime').textContent = data.time;
        
        // Show notification
        notification.classList.add('show');
        socialProofShown = true;
        
        // Track analytics
        if (typeof gtag !== 'undefined') {
            gtag('event', 'social_proof_shown', {
                'event_category': 'engagement',
                'event_label': `${data.name} - ${data.city}`
            });
        }
        
        // Hide after 7 seconds
        setTimeout(() => {
            notification.classList.remove('show');
            socialProofShown = false;
        }, 7000);
        
        // Move to next proof
        currentProofIndex = (currentProofIndex + 1) % socialProofData.length;
    }
    
    function closeSocialProof() {
        const notification = document.getElementById('socialProofNotification');
        notification.classList.remove('show');
        socialProofShown = false;
    }
    
    // Start showing social proof after 10 seconds
    setTimeout(() => {
        showSocialProof();
        
        // Show new proof every 30 seconds
        socialProofInterval = setInterval(() => {
            if (!socialProofShown) {
                showSocialProof();
            }
        }, 30000);
    }, 10000);
    
    // Pause when user scrolls to bottom (near CTA)
    window.addEventListener('scroll', function() {
        const scrollPosition = window.scrollY + window.innerHeight;
        const pageHeight = document.documentElement.scrollHeight;
        
        // If user is within 500px of bottom, pause social proof
        if (pageHeight - scrollPosition < 500) {
            clearInterval(socialProofInterval);
            document.getElementById('socialProofNotification').classList.remove('show');
        }
    });
</script>
